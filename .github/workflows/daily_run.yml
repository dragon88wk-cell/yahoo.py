name: Daily Stock Report

on:
  schedule:
    # UTC 기준입니다. 한국 시간 오전 8시는 UTC 23시입니다.
    - cron: '06 17 * * *'  # Fixed: 01:17 UTC → 23:00 UTC (KST 08:00)
  workflow_dispatch: # 직접 버튼 눌러서 실행하고 싶을 때 사용

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Prevent jobs from running indefinitely
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'  # Cache pip dependencies

      - name: 도구 설치
        run: pip install -r requirements.txt

      - name: 버전 확인
        run: |
          python --version
          pip list

      - name: 코드 실행
        # 바로 이 env 부분이 깃허브 금고에서 열쇠를 꺼내 파이썬 환경으로 넘겨주는 역할입니다.
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: 실패 알림
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -X POST https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage \
            -d chat_id=${TELEGRAM_CHAT_ID} \
            -d text="❌ Daily Stock Report Failed - Commit: ${{ github.sha }}"
